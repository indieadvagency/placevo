<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Placevo</title>
<style>
  :root { --coral1:#FF6B6B; --coral2:#FF9166; --ink:#1f2330; --muted:#5b6072; --bg:#fff7f1; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); padding:24px; }
  .logo { width:84px; height:84px; border-radius:22px; background:linear-gradient(135deg,var(--coral1),var(--coral2)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:42px; margin-bottom:20px; }
  h1 { margin:0; font-size:34px; }
  p { color:var(--muted); max-width:440px; }
  .links { margin-top:22px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  a.btn { text-decoration:none; padding:12px 22px; border-radius:999px; font-weight:600; }
  .primary { background:linear-gradient(135deg,var(--coral1),var(--coral2)); color:#fff; }
  .ghost { border:1px solid #f0c9b8; color:#e8553f; }
</style>
</head>
<body>
  <div class="logo">📍</div>
  <h1>Placevo</h1>
  <p>Plan trips with AI, keep every place on one map, split the bill to the cent, and share the journey with friends.</p>
  <div class="links">
    <a class="btn primary" href="support.html">Support</a>
    <a class="btn ghost" href="privacy.html">Privacy Policy</a>
  </div>
</body>
</html>
